name: Tibo RSS tracker

on:
  schedule:
    - cron: "3/5 * * * *"
  workflow_dispatch:
    inputs:
      send_test_message:
        description: "Send a Telegram test message without polling RSS"
        required: false
        default: false
        type: boolean
      daily_sum_date:
        description: "Send a daily post count for YYYY-MM-DD (Toronto time)"
        required: false
        default: ""
        type: string

concurrency:
  group: tibo-rss-tracker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {fetch-depth: 0}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.12"}
      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Poll RSS and Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TEST_MESSAGE: ${{ inputs.send_test_message || false }}
          DAILY_SUM_DATE: ${{ inputs.daily_sum_date || '' }}
        run: python tracker.py
      - name: Commit state if changed
        if: always()
        run: |
          git diff --quiet state.json && exit 0 || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add state.json
          git commit -m "Update Tibo tracker state"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
